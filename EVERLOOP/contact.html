<!DOCTYPE html>
<html>
<head>
  <title>Contact Us</title>
  <style>
    body { font-family: Perpetua Titling MT; margin:0; background:#f9fff9; }
    header { position:sticky; top:0; background:#228B22; padding:15px; display:flex; justify-content:space-between; align-items:center; }
    header h1 { color:white; margin:0; font-size:20px; }
    nav a { color:white; margin:0 10px; text-decoration:none; font-weight:bold; padding:8px 12px; border-radius:5px; }
    nav a:hover { background:#2E8B57; }
    h2 { color:#228B22; text-align:center; padding:20px; }
    form { width:60%; margin:auto; background:#fff; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
    label { display:block; margin-top:10px; font-weight:bold; }
    input, textarea { width:100%; padding:8px; margin-top:5px; border:1px solid #ccc; border-radius:5px; }
    button { background:#228B22; color:white; padding:10px; border:none; margin-top:10px; cursor:pointer; border-radius:5px; }
    button:hover { background:#006400; }
    .social { text-align:center; margin-top:20px; }
    footer { background:#228B22; color:white; text-align:center; padding:20px; margin-top:40px; }
  </style>
</head>
<body>

  <header>
    <h1>🌍 Sustainable Shop</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="pledge.html">Our Pledge</a>

      <a href="metrics.html">Impact Metrics</a>
      <a href="blog.html">Blog</a>
      <!--<a href="testimonials.html">Testimonials</a>--!> 
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <h2>Contact & Feedback</h2>

  <form>
    <label for="name">Name:</label>
    <input type="text" id="name" name="name">

    <label for="email">Email:</label>
    <input type="email" id="email" name="email">

    <label for="message">Message:</label>
    <textarea id="message" name="message" rows="5"></textarea>

    <button type="submit">Send</button>
  </form>

  <div class="social">
    <p>📧 Email: info@sustainableshop.com</p>
    <p>🌍 Facebook | 🐦 Twitter | 📸 Instagram</p>
  </div>

  <footer>
    We value your feedback — let’s grow together. © 2026 Sustainable Shop
  </footer>

</body>
